# ==========================================
# Banking Simulation Platform - Configuration
# ==========================================

spring.application.name=banking-simulation

# --- H2 In-Memory Database (no external DB required) ---
spring.datasource.url=jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# --- H2 Console (visit http://localhost:8080/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Server ---
server.port=${PORT:8080}

# --- Mail (disabled by default; set bank.alert.email-enabled=true and configure SMTP to enable) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Banking Alert Settings ---
bank.alert.low-balance-threshold=1000
bank.alert.email-enabled=false

# --- Transaction Report File ---
bank.report.file=reports/transactions.txt
